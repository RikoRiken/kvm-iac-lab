---
# ==============================================================================
# PHASE 5 : MONITORING COMPLET (STACK PLG : PROMETHEUS, LOKI, GRAFANA)
# ==============================================================================

- name: 1. Déploiement des Agents (Node Exporter & Promtail)
  hosts: all
  become: yes
  tasks:
    - name: 1.1 Installer Node Exporter (Métriques)
      ansible.builtin.apt:
        name: prometheus-node-exporter
        state: present
        update_cache: yes

    - name: 1.2 Ajouter la clé GPG du dépôt Grafana
      ansible.builtin.get_url:
        url: https://apt.grafana.com/gpg.key
        dest: /usr/share/keyrings/grafana.key
        mode: '0644'

    - name: 1.3 Ajouter le dépôt officiel Grafana
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/grafana.key] https://apt.grafana.com stable main"
        state: present

    - name: 1.4 Installer Promtail (Logs)
      ansible.builtin.apt:
        name: promtail
        state: present
        update_cache: yes

    - name: 1.5 Autoriser Promtail à lire les logs système (Groupe ADM)
      ansible.builtin.user:
        name: promtail
        groups: adm
        append: yes

    - name: 1.6 Configurer Promtail pour envoyer les logs vers Loki
      ansible.builtin.copy:
        dest: /etc/promtail/config.yml
        content: |
          server:
            http_listen_port: 9080
            grpc_listen_port: 0
          positions:
            filename: /tmp/positions.yaml
          clients:
            - url: http://172.16.50.10:3100/loki/api/v1/push
          scrape_configs:
            - job_name: system
              static_configs:
              - targets:
                  - localhost
                labels:
                  job: varlogs
                  host: "{{ inventory_hostname }}"
                  __path__: /var/log/*.log
      notify: Restart Promtail

  handlers:
    - name: Restart Promtail
      ansible.builtin.service:
        name: promtail
        state: restarted
        enabled: yes

- name: 2. Déploiement du Serveur Central (Prometheus, Loki, Grafana)
  hosts: vm-monitor
  become: yes
  tasks:
    - name: 2.1 Créer les répertoires de configuration
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - /opt/monitoring
        - /opt/monitoring/grafana_provisioning
        - /opt/monitoring/grafana_provisioning/datasources

    - name: 2.2 Automatiser la connexion Loki & Prometheus dans Grafana
      ansible.builtin.copy:
        dest: /opt/monitoring/grafana_provisioning/datasources/ds.yaml
        content: |
          apiVersion: 1
          datasources:
            - name: Prometheus
              type: prometheus
              url: http://prometheus:9090
              isDefault: true
            - name: Loki
              type: loki
              url: http://loki:3100

    - name: 2.3 Créer le fichier de configuration Prometheus
      ansible.builtin.copy:
        dest: /opt/monitoring/prometheus.yml
        content: |
          global:
            scrape_interval: 15s
          scrape_configs:
            - job_name: 'kvm-lab-nodes'
              static_configs:
                - targets:
                  - '172.16.10.1:9100'
                  - '172.16.20.10:9100'
                  - '172.16.30.10:9100'
                  - '172.16.40.10:9100'
                  - '172.16.50.10:9100'

    - name: 2.4 Mettre à jour le Docker Compose pour inclure le provisioning
      ansible.builtin.copy:
        dest: /opt/monitoring/docker-compose.yml
        content: |
          version: '3.8'
          services:
            prometheus:
              image: prom/prometheus:latest
              container_name: prometheus
              volumes:
                - ./prometheus.yml:/etc/prometheus/prometheus.yml
              restart: unless-stopped

            loki:
              image: grafana/loki:latest
              container_name: loki
              ports:
                - "0.0.0.0:3100:3100"  
              command: -config.file=/etc/loki/local-config.yaml
              restart: unless-stopped

            grafana:
              image: grafana/grafana:latest
              container_name: grafana
              ports:
                - "3000:3000"
              volumes:
                - ./grafana_provisioning:/etc/grafana/provisioning
              environment:
                - GF_SECURITY_ADMIN_PASSWORD=admin
              restart: unless-stopped

    - name: 2.5 Relancer la stack
      ansible.builtin.shell: /usr/bin/docker-compose up -d --force-recreate
      args:
        chdir: /opt/monitoring

        